<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title id="page-title">Growth OS</title>
  <meta name="description" content="Your personal operating system for sales, content, and growth.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gos-app" id="app">

  <!-- ── Sidebar (Desktop) ─────────────────────────────────── -->
  <aside class="gos-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">G</div>
        <span class="logo-name" id="sidebar-app-name">Growth OS</span>
      </div>
      <button class="sidebar-close-btn" id="sidebar-close-btn" onclick="app.closeMobileSidebar()" aria-label="Close menu">✕</button>
    </div>

    <div class="sidebar-profile" id="sidebar-profile">
      <div class="profile-avatar" id="sidebar-avatar">GV</div>
      <div class="profile-info">
        <div class="profile-name" id="sidebar-name">Gelo</div>
        <div class="profile-company" id="sidebar-company">Prime · Founder</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main navigation">
      <!-- Dynamically rendered by app.js buildNavigation() -->
    </nav>

    <div class="sidebar-footer">
      <div class="connection-indicator" id="connection-indicator">
        <span class="conn-dot" id="conn-dot"></span>
        <span class="conn-label" id="conn-label">Not Connected</span>
      </div>
      <div class="sidebar-conn-actions">
        <button class="btn-sidebar-action" id="btn-connect" onclick="app.connectSheets()">Connect Sheets</button>
        <button class="btn-sidebar-action" id="btn-disconnect" style="display:none" onclick="app.disconnectSheets()">Disconnect</button>
        <button class="btn-sidebar-action" id="btn-refresh" style="display:none" onclick="app.refreshFromSheets()">↻ Sync</button>
      </div>
    </div>
  </aside>

  <!-- ── Sidebar Overlay (Mobile) ──────────────────────────── -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="app.closeMobileSidebar()"></div>

  <!-- ── Main Content ──────────────────────────────────────── -->
  <main class="gos-main" id="gos-main">

    <!-- Topbar -->
    <header class="gos-topbar" id="gos-topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" id="topbar-menu-btn" onclick="app.openMobileSidebar()" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <button class="topbar-icon-btn btn-sidebar-toggle" id="btn-sidebar-toggle" onclick="app.toggleSidebar()" title="Collapse sidebar" aria-label="Collapse sidebar">◧</button>
        <div class="topbar-title-block">
          <h1 class="topbar-title" id="view-title">Today</h1>
          <p class="topbar-subtitle" id="view-subtitle"></p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-search-wrap" id="topbar-search-wrap">
          <span class="search-icon">🔍</span>
          <input class="topbar-search" id="global-search" type="search" placeholder="Search…" autocomplete="off" oninput="app.handleSearch(this.value)">
        </div>
        <div class="topbar-controls">
          <select class="topbar-filter" id="filter-status" onchange="app.handleFilterStatus(this.value)">
            <option value="all">All</option>
          </select>
          <button class="topbar-icon-btn" id="btn-theme-toggle" onclick="app.toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark mode">🌓</button>
          <button class="topbar-btn-primary" id="btn-add-record" onclick="app.openAddModal()">+ Add</button>
        </div>
      </div>
    </header>

    <!-- Page Content Area -->
    <div class="gos-content" id="main-content">
      <!-- Rendered dynamically by app.js -->
      <div class="initial-loading">
        <div class="loading-spinner"></div>
        <p>Loading Growth OS…</p>
      </div>
    </div>

  </main>

  <!-- ── Mobile Bottom Navigation ──────────────────────────── -->
  <nav class="mobile-bottom-nav" id="mobile-bottom-nav" aria-label="Mobile navigation">
    <button class="mobile-nav-btn active" id="mob-nav-today" data-module="today" onclick="app.navigateTo('today')">
      <span class="mob-nav-icon">🏠</span>
      <span class="mob-nav-label" id="mob-label-today">Today</span>
    </button>
    <button class="mobile-nav-btn" id="mob-nav-calendar" data-module="calendar" onclick="app.navigateTo('calendar')">
      <span class="mob-nav-icon">📅</span>
      <span class="mob-nav-label" id="mob-label-calendar">Calendar</span>
    </button>
    <button class="mobile-nav-btn" id="mob-nav-leads" data-module="leads" onclick="app.navigateTo('leads')">
      <span class="mob-nav-icon">👤</span>
      <span class="mob-nav-label" id="mob-label-leads">Leads</span>
    </button>
    <button class="mobile-nav-btn" id="mob-nav-messages" data-module="messages" onclick="app.navigateTo('messages')">
      <span class="mob-nav-icon">💬</span>
      <span class="mob-nav-label" id="mob-label-messages">Messages</span>
    </button>
    <button class="mobile-nav-btn" id="mob-nav-more" onclick="app.openMoreDrawer()">
      <span class="mob-nav-icon">⋯</span>
      <span class="mob-nav-label">More</span>
    </button>
  </nav>

  <!-- ── Mobile More Drawer ─────────────────────────────────── -->
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="app.closeMoreDrawer()"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">More</div>
    <nav class="drawer-nav" id="drawer-nav">
      <!-- Rendered dynamically -->
    </nav>
  </div>

  <!-- ── Detail Panel (Right slide-out) ────────────────────── -->
  <div class="panel-backdrop" id="panel-backdrop" onclick="app.closePanel()"></div>
  <aside class="gos-panel" id="detail-panel">
    <div class="panel-head">
      <div class="panel-head-title" id="panel-title">Record Details</div>
      <button class="panel-close-btn" onclick="app.closePanel()" aria-label="Close panel">✕</button>
    </div>
    <div class="panel-body" id="panel-body"><!-- dynamic --></div>
    <div class="panel-foot" id="panel-footer"><!-- dynamic --></div>
  </aside>

  <!-- ── Add Record Modal ───────────────────────────────────── -->
  <div class="modal-backdrop" id="add-modal-overlay" onclick="if(event.target===this)app.closeModal('add-modal')">
    <div class="gos-modal" id="add-modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 class="modal-title" id="add-modal-title">Add New Record</h3>
        <button class="modal-close-btn" onclick="app.closeModal('add-modal')" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <form id="add-form" onsubmit="event.preventDefault(); app.handleAddRecord()">
          <div id="add-form-fields"></div>
          <div class="modal-foot">
            <button type="button" class="btn-secondary" onclick="app.closeModal('add-modal')">Cancel</button>
            <button type="submit" class="btn-primary">Save Record</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── Message Generator Modal ───────────────────────────── -->
  <div class="modal-backdrop" id="msg-modal-overlay" onclick="if(event.target===this)app.closeModal('msg-modal')">
    <div class="gos-modal modal-lg" id="msg-modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 class="modal-title">Message Generator</h3>
        <button class="modal-close-btn" onclick="app.closeModal('msg-modal')" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="msg-modal-body"><!-- dynamic --></div>
    </div>
  </div>

  <!-- ── Confirm Modal ──────────────────────────────────────── -->
  <div class="modal-backdrop" id="confirm-modal-overlay" style="display:none">
    <div class="gos-modal modal-sm" id="confirm-modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 class="modal-title" id="confirm-title">Confirm</h3>
      </div>
      <div class="modal-body">
        <p id="confirm-message" style="margin:0;line-height:1.6"></p>
      </div>
      <div class="modal-foot">
        <button class="btn-secondary" onclick="app.cancelConfirm()">Cancel</button>
        <button class="btn-danger" id="confirm-action-btn" onclick="app.executeConfirm()">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── Toast Container ───────────────────────────────────── -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

</div><!-- /.gos-app -->

<script src="demo-data.js"></script>
<script src="message-templates.js"></script>
<script src="settings-engine.js"></script>
<script src="sheets-config.js"></script>
<script src="app.js"></script>
</body>
</html>
